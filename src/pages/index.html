<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHT Transport Company</title>
    <!-- Configuración de Tailwind -->
    <link href="../css/tailwind.css" rel="stylesheet">
    <!-- Iconos Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <!-- Alpine.js -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body class="bg-jht-gray text-jht-dark font-sans antialiased overflow-x-hidden flex flex-col min-h-screen">

    <!-- 1. HEADER (Se integrará luego) -->
    <!-- <!-- REVISAR: El header se inyectará aquí desde los componentes --> -->

    <!-- CONTENEDOR PRINCIPAL -->
    <main id="app-container" class="flex-grow flex flex-col w-full">

        <!-- 2. HERO -->
        <section id="home" class="w-full min-h-screen relative overflow-hidden">
            <div class="max-w-7xl mx-auto w-full px-4 md:px-10 py-20">
                <!-- <!-- REVISAR: Aquí irá el video de fondo y el widget de seguimiento --> -->
                <h1 class="text-center font-title text-4xl text-jht-blue-support border border-dashed border-jht-blue-support p-10">Hero (Vacío)</h1>
            </div>
        </section>

        <!-- 3. SERVICIOS -->
        <section id="servicios" class="w-full bg-white">
            <div class="max-w-7xl mx-auto w-full px-4 md:px-10 py-20">
                <!-- <!-- REVISAR: Aquí irá el Grid de 4 tarjetas --> -->
                <h2 class="text-center font-title text-4xl text-jht-blue-support border border-dashed border-jht-blue-support p-10">Nuestros Servicios (Vacío)</h2>
            </div>
        </section>

        <!-- 4. CLIENTES (Opinan) -->
        <section id="clientes" class="w-full bg-jht-gray">
            <div class="max-w-7xl mx-auto w-full px-4 md:px-10 py-20">
                <!-- <!-- REVISAR: Aquí irá el Grid/Marquesina de Logos en escala de grises --> -->
                <h2 class="text-center font-title text-4xl text-jht-blue-support border border-dashed border-jht-blue-support p-10">Nuestros Clientes Opinan (Vacío)</h2>
            </div>
        </section>

        <!-- 5. FLOTA -->
        <section id="flota" class="w-full bg-white">
            <div class="max-w-7xl mx-auto w-full px-4 md:px-10 py-20">
                <!-- <!-- REVISAR: Aquí irán los Tabs con Alpine.js --> -->
                <h2 class="text-center font-title text-4xl text-jht-blue-support border border-dashed border-jht-blue-support p-10">Nuestra Flota (Vacío)</h2>
            </div>
        </section>

        <!-- 6. NOSOTROS -->
        <section id="nosotros" class="w-full bg-jht-gray">
            <div class="max-w-7xl mx-auto w-full px-4 md:px-10 py-20">
                <!-- <!-- REVISAR: Aquí irá la sección sobre nosotros y el carrusel de imágenes --> -->
                <h2 class="text-center font-title text-4xl text-jht-blue-support border border-dashed border-jht-blue-support p-10">Sobre Nosotros (Vacío)</h2>
            </div>
        </section>

        <!-- 7. CONTACTO -->
        <section id="contacto" class="w-full bg-white">
            <div class="max-w-7xl mx-auto w-full px-4 md:px-10 py-20">
                <!-- <!-- REVISAR: Aquí irá el Formulario de contacto y el mapa --> -->
                <h2 class="text-center font-title text-4xl text-jht-blue-support border border-dashed border-jht-blue-support p-10">Contacto (Vacío)</h2>
            </div>
        </section>

    </main>

    <!-- 8. FOOTER (Se integrará luego) -->
    <!-- <!-- REVISAR: El footer se inyectará aquí desde los componentes --> -->

</body>
</html>
