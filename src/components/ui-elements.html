<!-- Componentes Reutilizables de UI (Ejemplos para copiar y pegar) -->

<!-- 1. Botón Principal (Llamado a la Acción) -->
<!-- Uso: Para botones destacados como "Rastrear mi envío" o "Área Cliente" -->
<button class="btn-primary">
    Rastrear mi envío
</button>

<a href="#" class="btn-primary">
    Área Cliente
</a>


<!-- 2. Input de Formulario -->
<!-- Uso: Formularios de rastreo o contacto -->
<div class="flex flex-col gap-2 max-w-sm">
    <label class="text-sm font-bold text-jht-dark">Número de Seguimiento</label>
    <input type="text" placeholder="Ej. V001-20000" class="jht-input">
</div>


<!-- 3. Tarjeta de Servicio -->
<!-- Uso: Grid de servicios en Landing o Home -->
<div class="jht-card p-8">
    <div class="w-16 h-16 rounded-xl bg-[#FFF9CC] flex items-center justify-center mb-6 text-jht-gold">
        <span class="material-symbols-outlined fill text-3xl">local_shipping</span>
    </div>
    <h3 class="font-title text-xl font-bold text-jht-dark mb-3">Transporte de Carga</h3>
    <p class="text-jht-blue-support flex-grow">
        Movimiento seguro y eficiente de mercancías a nivel nacional con monitoreo constante.
    </p>
</div>


<!-- 4. Etiqueta / Tag (Para adornos o subtítulos pequeños) -->
<div class="inline-flex items-center gap-2 px-3 py-1 bg-transparent border border-jht-gold/30 rounded text-jht-gold text-xs font-bold uppercase tracking-widest">
    <span class="w-1.5 h-1.5 rounded-full bg-jht-gold"></span>
    SOLUCIONES INTEGRALES
</div>
