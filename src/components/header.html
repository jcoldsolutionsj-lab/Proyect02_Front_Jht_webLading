<!-- Header / Nav Component -->
<!-- Usa Alpine.js para estado de scroll y menú móvil -->
<header x-data="{ scrolled: false, mobileMenuOpen: false }" @scroll.window="scrolled = (window.pageYOffset > 20)"
    :class="scrolled ? 'nav-solid py-2' : 'nav-transparent py-4'"
    class="fixed top-0 w-full z-50 transition-all duration-300">

    <div class="max-w-7xl mx-auto px-4 md:px-10 flex justify-between items-center w-full">
        <!-- Logo -->
        <a href="/" class="flex items-center">
            <img alt="JHT Transport Logo" class="h-12 w-auto object-contain transition-all duration-300"
                src="../assets/images/branding/JHTmarca-transparente.png" />
        </a>

        <!-- Desktop Menu -->
        <nav class="hidden md:flex items-center gap-8">
            <a href="#servicios"
                class="font-title font-semibold text-white hover:text-jht-gold transition-colors">Servicios</a>
            <a href="#flota" class="font-title font-semibold text-white hover:text-jht-gold transition-colors">Flota</a>
            <a href="#nosotros"
                class="font-title font-semibold text-white hover:text-jht-gold transition-colors">Nosotros</a>
            <a href="#contacto"
                class="font-title font-semibold text-white hover:text-jht-gold transition-colors">Contacto</a>
            <a href="#area-cliente" class="btn-primary py-2 px-5 text-sm">Acceso</a>
        </nav>

        <!-- Mobile Menu Button -->
        <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden text-white p-2 focus:outline-none">
            <svg x-show="!mobileMenuOpen" class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                </path>
            </svg>
            <svg x-show="mobileMenuOpen" class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg" style="display: none;">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </div>

    <!-- Mobile Dropdown Menu -->
    <div x-show="mobileMenuOpen" x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0"
        x-transition:leave-end="opacity-0 -translate-y-2" @click.away="mobileMenuOpen = false"
        class="md:hidden absolute top-full left-0 w-full bg-jht-dark border-t border-jht-blue-support/20 shadow-xl"
        style="display: none;">
        <nav class="flex flex-col p-4 gap-4">
            <a href="#servicios" @click="mobileMenuOpen = false"
                class="font-title font-semibold text-white hover:text-jht-gold transition-colors">Servicios</a>
            <a href="#flota" @click="mobileMenuOpen = false"
                class="font-title font-semibold text-white hover:text-jht-gold transition-colors">Flota</a>
            <a href="#nosotros" @click="mobileMenuOpen = false"
                class="font-title font-semibold text-white hover:text-jht-gold transition-colors">Nosotros</a>
            <a href="#contacto" @click="mobileMenuOpen = false"
                class="font-title font-semibold text-white hover:text-jht-gold transition-colors">Contacto</a>
            <a href="#area-cliente" @click="mobileMenuOpen = false"
                class="btn-primary w-full text-center mt-2">Acceso</a>
        </nav>
    </div>
</header>
